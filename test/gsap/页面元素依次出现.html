<script>
  // 页面加载完成后，元素按顺序渐入
  gsap.from(".section > div", {
    opacity: 0,
    y: 30, // 从下方30px处上来
    stagger: 0.1, // 每个元素延迟0.1s执行，形成序列动画
    duration: 0.6,
    ease: "power2.out",
    delay: 0.2, // 页面加载后延迟0.2s开始
  });
