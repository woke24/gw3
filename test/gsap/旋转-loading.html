<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Animations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f5;
        gap: 40px;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .loading-label {
        color: #666;
        font-size: 14px;
      }

      /* 基础旋转加载器 */
      .loading-icon {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
      }

      /* 点状加载器 */
      .dots-loader {
        display: flex;
        gap: 10px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #3498db;
      }

      /* 脉冲加载器 */
      .pulse-loader {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #3498db;
      }

      /* 方块加载器 */
      .square-loader {
        width: 40px;
        height: 40px;
        background-color: #3498db;
      }

      /* 波浪加载器 */
      .wave-loader {
        display: flex;
        gap: 5px;
      }

      .wave-bar {
        width: 4px;
        height: 30px;
        background-color: #3498db;
      }

      /* 控制按钮 */
      .controls {
        display: flex;
        gap: 20px;
        margin-top: 40px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background-color: #3498db;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn:active {
        transform: translateY(0);
      }

      /* 加载状态容器 */
      .loading-demo {
        padding: 30px;
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        min-width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .loading-text {
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- 基础旋转加载器 -->
    <div class="loading-container">
      <div class="loading-icon"></div>
      <span class="loading-label">旋转加载</span>
    </div>

    <!-- 点状加载器 -->
    <div class="loading-container">
      <div class="dots-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="loading-label">点状加载</span>
    </div>

    <!-- 脉冲加载器 -->
    <div class="loading-container">
      <div class="pulse-loader"></div>
      <span class="loading-label">脉冲加载</span>
    </div>

    <!-- 方块加载器 -->
    <div class="loading-container">
      <div class="square-loader"></div>
      <span class="loading-label">方块加载</span>
    </div>

    <!-- 波浪加载器 -->
    <div class="loading-container">
      <div class="wave-loader">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <span class="loading-label">波浪加载</span>
    </div>

    <!-- 实际应用示例 -->
    <div class="loading-demo">
      <div class="loading-icon"></div>
      <div class="loading-text">正在加载中...</div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="btn" onclick="startAllAnimations()">开始动画</button>
      <button class="btn" onclick="stopAllAnimations()">停止动画</button>
    </div>

    <script>
      // 基础旋转动画
      function rotateLoading(el) {
        return gsap.to(el, {
          rotation: 360,
          duration: 1.5,
          ease: "none",
          repeat: -1,
        });
      }

      // 点状动画
      function dotsAnimation(dots) {
        dots.forEach((dot, index) => {
          gsap.to(dot, {
            scale: 1.5,
            duration: 0.5,
            repeat: -1,
            yoyo: true,
            ease: "power2.inOut",
            delay: index * 0.2,
          });
        });
      }

      // 脉冲动画
      function pulseAnimation(el) {
        gsap.to(el, {
          scale: 1.2,
          opacity: 0.5,
          duration: 1,
          repeat: -1,
          yoyo: true,
          ease: "power2.inOut",
        });
      }

      // 方块旋转动画
      function squareAnimation(el) {
        gsap.to(el, {
          rotation: 360,
          duration: 1,
          ease: "none",
          repeat: -1,
        });
      }

      // 波浪动画
      function waveAnimation(bars) {
        bars.forEach((bar, index) => {
          gsap.to(bar, {
            scaleY: 0.3,
            duration: 0.5,
            repeat: -1,
            yoyo: true,
            ease: "power2.inOut",
            delay: index * 0.1,
          });
        });
      }

      // 存储所有动画实例
      let animations = [];

      // 开始所有动画
      function startAllAnimations() {
        // 清除现有动画
        stopAllAnimations();

        // 启动新动画
        animations.push(rotateLoading(document.querySelector(".loading-icon")));
        dotsAnimation(document.querySelectorAll(".dot"));
        pulseAnimation(document.querySelector(".pulse-loader"));
        squareAnimation(document.querySelector(".square-loader"));
        waveAnimation(document.querySelectorAll(".wave-bar"));
      }

      // 停止所有动画
      function stopAllAnimations() {
        animations.forEach((animation) => animation.kill());
        animations = [];
        gsap.killTweensOf("*");
      }

      // 页面加载时自动开始动画
      window.addEventListener("load", () => {
        startAllAnimations();
      });
    </script>
  </body>
</html>
