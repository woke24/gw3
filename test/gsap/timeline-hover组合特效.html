<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Cards with GSAP Animations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .title {
        text-align: center;
        font-size: 36px;
        color: #333;
        margin-bottom: 40px;
      }

      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        padding: 20px;
      }

      .product-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s ease;
        cursor: pointer;
      }

      .product-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        display: block;
      }

      .product-content {
        padding: 20px;
      }

      .card-title {
        font-size: 20px;
        color: #333;
        margin-bottom: 10px;
        transition: color 0.2s ease;
      }

      .card-desc {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 15px;
      }

      .card-price {
        font-size: 24px;
        color: #cc0c39;
        font-weight: bold;
      }

      .card-badge {
        display: inline-block;
        padding: 4px 8px;
        background-color: #ffeb3b;
        color: #333;
        font-size: 12px;
        border-radius: 4px;
        margin-bottom: 10px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .rating {
        display: flex;
        gap: 2px;
        color: #ffc107;
      }

      /* 添加一些额外的样式以增强视觉效果 */
      .product-card {
        position: relative;
        overflow: hidden;
      }
      /* 卡片亮光闪过 */
      .product-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s;
      }

      .product-card:hover::before {
        left: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">热门产品</h1>

      <div class="products-grid">
        <!-- 产品卡片 1 -->
        <div class="product-card">
          <img
            src="https://picsum.photos/seed/product1/400/300.jpg"
            alt="Product 1"
            class="product-image"
          />
          <div class="product-content">
            <span class="card-badge">热卖</span>
            <h3 class="card-title">高级耳机</h3>
            <p class="card-desc">
              专业级降噪技术，带来沉浸式音频体验。长达30小时的电池续航，让您尽情享受音乐。
            </p>
            <div class="card-footer">
              <span class="card-price">¥899</span>
              <div class="rating">★★★★★</div>
            </div>
          </div>
        </div>

        <!-- 产品卡片 2 -->
        <div class="product-card">
          <img
            src="https://picsum.photos/seed/product2/400/300.jpg"
            alt="Product 2"
            class="product-image"
          />
          <div class="product-content">
            <span class="card-badge">新品</span>
            <h3 class="card-title">智能手表</h3>
            <p class="card-desc">
              健康监测、运动追踪、智能提醒一应俱全。防水设计，适合各种运动场景。
            </p>
            <div class="card-footer">
              <span class="card-price">¥1299</span>
              <div class="rating">★★★★☆</div>
            </div>
          </div>
        </div>

        <!-- 产品卡片 3 -->
        <div class="product-card">
          <img
            src="https://picsum.photos/seed/product3/400/300.jpg"
            alt="Product 3"
            class="product-image"
          />
          <div class="product-content">
            <span class="card-badge">限量版</span>
            <h3 class="card-title">机械键盘</h3>
            <p class="card-desc">
              专业游戏键盘，机械轴体，RGB背光系统。可自定义按键，提供最佳游戏体验。
            </p>
            <div class="card-footer">
              <span class="card-price">¥599</span>
              <div class="rating">★★★★★</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".product-card").forEach((card) => {
          const title = card.querySelector(".card-title");
          const desc = card.querySelector(".card-desc");
          const badge = card.querySelector(".card-badge");

          // 初始化：隐藏描述文字和徽章
          gsap.set([desc, badge], {
            opacity: 0,
            y: 10,
          });

          // 鼠标进入动画
          card.addEventListener("mouseenter", () => {
            const tl = gsap.timeline();

            // 卡片缩放和阴影
            tl.to(card, {
              scale: 1.03,
              boxShadow: "0 12px 24px rgba(0,0,0,0.18)",
              duration: 0.3,
              ease: "power2.out",
            })
              // 标题颜色变化
              .to(
                title,
                {
                  color: "#cc0c39",
                  duration: 0.2,
                },
                "<0.1"
              )
              // 徽章渐显
              .to(
                badge,
                {
                  opacity: 1,
                  y: 0,
                  duration: 0.3,
                },
                "<"
              )
              // 描述文字渐显
              .to(
                desc,
                {
                  opacity: 1,
                  y: 0,
                  duration: 0.3,
                },
                "<0.1"
              );
          });

          // 鼠标离开动画
          card.addEventListener("mouseleave", () => {
            const tl = gsap.timeline();

            // 卡片缩放和阴影恢复
            tl.to(card, {
              scale: 1,
              boxShadow: "0 6px 12px rgba(0,0,0,0.08)",
              duration: 0.3,
              ease: "power2.out",
            })
              // 标题颜色恢复
              .to(
                title,
                {
                  color: "#333",
                  duration: 0.2,
                },
                "<0.1"
              )
              // 徽章隐藏
              .to(
                badge,
                {
                  opacity: 0,
                  y: 10,
                  duration: 0.3,
                },
                "<"
              )
              // 描述文字隐藏
              .to(
                desc,
                {
                  opacity: 0,
                  y: 10,
                  duration: 0.3,
                },
                "<0.1"
              );
          });
        });
      });
    </script>
  </body>
</html>
