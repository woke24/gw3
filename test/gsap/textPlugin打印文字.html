<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP 打字机效果</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 2rem;
      }

      .demo-section {
        margin: 30px 0;
        padding: 30px;
        background: #f8f9fa;
        border-radius: 10px;
        min-height: 100px;
        display: flex;
        align-items: center;
      }

      .typewriter {
        font-size: 1.5rem;
        color: #333;
        line-height: 1.6;
        position: relative;
        display: inline-block;
      }

      .typewriter::after {
        content: "|";
        position: absolute;
        right: -10px;
        animation: blink 1s infinite;
        color: #667eea;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 20px;
      }

      .speed-control {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }

      .speed-control label {
        color: #555;
        font-weight: 500;
      }

      #speedSlider {
        flex: 1;
        height: 6px;
        border-radius: 3px;
        background: #ddd;
        outline: none;
        -webkit-appearance: none;
      }

      #speedSlider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
      }

      #speedSlider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #667eea;
        cursor: pointer;
      }

      button {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #5a67d8;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      #speedValue {
        color: #667eea;
        font-weight: 500;
        min-width: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>GSAP 打字机效果</h1>

      <div class="demo-section">
        <div class="typewriter"></div>
      </div>

      <div class="controls">
        <div class="speed-control">
          <label for="speedSlider">打字速度：</label>
          <input
            type="range"
            id="speedSlider"
            min="0.5"
            max="3"
            step="0.1"
            value="1.5"
          />
          <span id="speedValue">1.5秒</span>
        </div>
        <button onclick="startTyping()">开始打字</button>
      </div>
    </div>

    <script>
      gsap.registerPlugin(TextPlugin);

      // 速度滑块事件监听
      document
        .getElementById("speedSlider")
        .addEventListener("input", function (e) {
          document.getElementById("speedValue").textContent =
            e.target.value + "秒";
        });

      function startTyping() {
        const duration = parseFloat(
          document.getElementById("speedSlider").value
        );

        // 先重置
        gsap.set(".typewriter", { textContent: "" });

        // 开始打字动画
        gsap.to(".typewriter", {
          duration: duration,
          text: {
            value: "66666666666666666666666666666666666",
            delimiter: "",
          },
          ease: "none",
        });
      }

      // 页面加载时自动开始
      window.addEventListener("load", () => {
        startTyping();
      });
    </script>
  </body>
</html>
