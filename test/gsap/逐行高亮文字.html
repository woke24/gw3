<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Text Highlight Animation</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #000;
      }

      .text-container {
        padding: 50px;
        max-width: 800px;
      }

      .highlight-text {
        margin: 0;
        padding: 10px 0;
        color: #fff;
        font-size: 18px;
        line-height: 1.8;
        text-align: center;
        opacity: 0.3;
        /* transform: translateY(10px); */
        /* transition: all 0.3s ease; */
      }
    </style>
  </head>
  <body>
    <div class="text-container">
      <p class="highlight-text">精工之艺精华，聚挚友之所爱</p>
      <p class="highlight-text">打造腕表史上边框最窄的「独白」，颠覆</p>
      <p class="highlight-text">四季更迭，让眼界视觉更通透明亮</p>
      <p class="highlight-text">独白设计，让梦寐以求的「白」惊艳全场</p>
      <p class="highlight-text">
        从内而外的好设计，只为做出一台你心中所展的理想之作
      </p>
      <p class="highlight-text">腕表 21</p>
      <p class="highlight-text">凝练美学沉淀与精华，从此刻呈现</p>
    </div>

    <script>
      // 获取所有文本行元素
      const textLines = document.querySelectorAll(".highlight-text");

      // 创建时间线
      const tl = gsap.timeline({
        repeat: -1, // 无限循环
        // yoyo: true,
        // repeatDelay: 1, // 每次循环结束后的延迟
      });

      // 为每行添加动画
      textLines.forEach((line, index) => {
        // 高亮动画
        tl.to(
          line,
          {
            duration: 0.8,
            opacity: 1,
            // y: 0,
            // color: "#fff",
            scaleX: 1.05,
            skewX: -10,
            ease: "power2.out",
          },
          index * 0.6
        ) // 每行延迟0.3秒

          // 取消高亮动画
          .to(
            line,
            {
              duration: 0.8,
              opacity: 0.3,
              //   y: 2,
              //   color: "#666",
              scaleX: 1,
              skewX: 0,
              ease: "power2.in",
            },
            index * 0.6 + 0.6
          ); // 在高亮后1秒开始取消高亮
      });

      tl.to(textLines, {
        duration: 0.8,
        opacity: 1,
        // y: 0,
        // color: "#fff",
        // letterSpacing: "0px",
        skewX: -10,
        ease: "power2.out",
        //   stagger: 0.1, // 错开动画
      }).to(
        {},
        {
          duration: 2,
        }
      );

      // 鼠标悬停暂停动画
      //   document
      //     .querySelector(".text-container")
      //     .addEventListener("mouseenter", () => {
      //       tl.pause();
      //     });

      //   // 鼠标离开继续动画
      //   document
      //     .querySelector(".text-container")
      //     .addEventListener("mouseleave", () => {
      //       tl.resume();
      //     });
    </script>
  </body>
</html>
