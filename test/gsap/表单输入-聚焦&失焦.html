<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Form Effects</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f5;
        padding: 20px;
      }

      .form-container {
        background-color: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      .form-title {
        font-size: 24px;
        margin-bottom: 30px;
        color: #333;
        text-align: center;
      }

      .form-group {
        margin-bottom: 25px;
        position: relative;
      }

      .form-input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: all 0.3s ease;
        background-color: transparent;
      }

      .form-label {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: #666;
        pointer-events: none;
        transition: all 0.3s ease;
        background-color: white;
        padding: 0 4px;
      }

      .form-input:focus,
      .form-input:not(:placeholder-shown) {
        border-color: #2e7d32;
      }

      .form-input:focus ~ .form-label,
      .form-input:not(:placeholder-shown) ~ .form-label {
        top: 0;
        font-size: 12px;
        color: #2e7d32;
      }

      .form-error {
        color: #f44336;
        font-size: 12px;
        margin-top: 5px;
        opacity: 0;
        transform: translateY(-10px);
        transition: all 0.3s ease;
      }

      .form-error.show {
        opacity: 1;
        transform: translateY(0);
      }

      .form-submit {
        width: 100%;
        padding: 12px;
        background-color: #2e7d32;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .form-submit:hover {
        background-color: #1b5e20;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .form-submit:active {
        transform: translateY(0);
      }

      .success-message {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #4caf50;
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transform: translateX(400px);
        transition: transform 0.3s ease;
      }

      .success-message.show {
        transform: translateX(0);
      }

      .input-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #666;
        opacity: 0;
        transition: all 0.3s ease;
      }

      .form-input:focus ~ .input-icon {
        opacity: 1;
        color: #2e7d32;
      }

      .form-input.error {
        border-color: #f44336;
      }

      .form-input.error ~ .input-icon {
        color: #f44336;
        opacity: 1;
      }

      .form-input.success {
        border-color: #4caf50;
      }

      .form-input.success ~ .input-icon {
        color: #4caf50;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2 class="form-title">用户注册</h2>
      <form id="registrationForm">
        <div class="form-group">
          <input
            type="text"
            class="form-input"
            id="username"
            placeholder=" "
            required
          />
          <label for="username" class="form-label">用户名</label>
          <span class="input-icon">✓</span>
          <div class="form-error">用户名至少需要3个字符</div>
        </div>

        <div class="form-group">
          <input
            type="email"
            class="form-input"
            id="email"
            placeholder=" "
            required
          />
          <label for="email" class="form-label">邮箱地址</label>
          <span class="input-icon">✓</span>
          <div class="form-error">请输入有效的邮箱地址</div>
        </div>

        <div class="form-group">
          <input
            type="password"
            class="form-input"
            id="password"
            placeholder=" "
            required
          />
          <label for="password" class="form-label">密码</label>
          <span class="input-icon">✓</span>
          <div class="form-error">密码至少需要6个字符</div>
        </div>

        <button type="submit" class="form-submit">注册</button>
      </form>
    </div>

    <div class="success-message" id="successMessage">注册成功！</div>

    <script>
      // 输入框焦点动画
      document.querySelectorAll(".form-input").forEach((input) => {
        // 聚焦效果
        input.addEventListener("focus", () => {
          gsap.to(input, {
            borderColor: "#2e7d32",
            boxShadow: "0 0 0 3px rgba(46,125,50,0.2)",
            duration: 0.2,
          });
        });

        // 失焦效果
        input.addEventListener("blur", () => {
          if (
            !input.classList.contains("error") &&
            !input.classList.contains("success")
          ) {
            gsap.to(input, {
              borderColor: "#ddd",
              boxShadow: "none",
              duration: 0.2,
            });
          }
        });

        // 输入验证
        input.addEventListener("input", () => {
          validateInput(input);
        });
      });

      // 验证输入
      function validateInput(input) {
        const errorMsg = input.parentElement.querySelector(".form-error");
        let isValid = false;

        switch (input.type) {
          case "text":
            isValid = input.value.length >= 3;
            break;
          case "email":
            isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value);
            break;
          case "password":
            isValid = input.value.length >= 6;
            break;
        }

        if (input.value && !isValid) {
          showError(input, errorMsg);
        } else if (input.value && isValid) {
          showSuccess(input, errorMsg);
        } else {
          resetInput(input, errorMsg);
        }
      }

      // 显示错误状态
      function showError(input, errorMsg) {
        input.classList.remove("success");
        input.classList.add("error");
        errorMsg.classList.add("show");
        gsap.to(input, {
          borderColor: "#f44336",
          boxShadow: "0 0 0 3px rgba(244,67,54,0.2)",
          duration: 0.2,
        });
      }

      // 显示成功状态
      function showSuccess(input, errorMsg) {
        input.classList.remove("error");
        input.classList.add("success");
        errorMsg.classList.remove("show");
        gsap.to(input, {
          borderColor: "#4caf50",
          boxShadow: "0 0 0 3px rgba(76,175,80,0.2)",
          duration: 0.2,
        });
      }

      // 重置输入状态
      function resetInput(input, errorMsg) {
        input.classList.remove("error", "success");
        errorMsg.classList.remove("show");
        gsap.to(input, {
          borderColor: "#ddd",
          boxShadow: "none",
          duration: 0.2,
        });
      }

      // 表单提交
      document
        .getElementById("registrationForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          // 验证所有输入
          const inputs = document.querySelectorAll(".form-input");
          let isFormValid = true;

          inputs.forEach((input) => {
            validateInput(input);
            if (input.classList.contains("error") || !input.value) {
              isFormValid = false;
            }
          });

          if (isFormValid) {
            // 显示成功消息
            const successMsg = document.getElementById("successMessage");
            gsap.to(successMsg, {
              x: 0,
              duration: 0.3,
              ease: "power2.out",
            });

            // 3秒后隐藏成功消息
            setTimeout(() => {
              gsap.to(successMsg, {
                x: 400,
                duration: 0.3,
                ease: "power2.in",
              });
            }, 3000);

            // 重置表单
            inputs.forEach((input) => {
              input.value = "";
              resetInput(
                input,
                input.parentElement.querySelector(".form-error")
              );
            });
          }
        });
    </script>
  </body>
</html>
