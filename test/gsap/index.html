<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>中间偏上烟火特效</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

		<style>
			/* 新增：相对定位的容器 */
			.celebration-container {
				position: relative;
				width: 100%;
				height: 400px; /* 可根据需要调整容器高度 */
				margin: 0 auto; /* 使容器自身在父元素中居中 */
				overflow: hidden; /* 可选：隐藏超出容器的粒子 */
			}

			.celebration-effect-canvas {
				position: absolute;
				/* 绝对定位居中 */
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%);
				/* 使canvas大小适应容器 */
				width: 100%;
				height: 100%;
				pointer-events: none;
				z-index: 1;
			}
		</style>
	</head>
	<body>
		<div class="celebration-container">
			<canvas class="celebration-effect-canvas"></canvas>
		</div>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				const container = document.querySelector(".celebration-container");
				const canvas = document.querySelector(".celebration-effect-canvas");
				const ctx = canvas.getContext("2d");

				// 使用容器的尺寸而非窗口尺寸
				let W = container.offsetWidth;
				let H = container.offsetHeight;
				canvas.width = W;
				canvas.height = H;
				let isAnimating = false;
				ctx.imageSmoothingEnabled = true;

				// 烟火颜色方案
				function randomColor() {
					const fireworkColors = [
						["#FF5252", "#FF8A80"], // 红色系
						["#448AFF", "#82B1FF"], // 蓝色系
						["#FFEB3B", "#FFF59D"], // 黄色系
						["#00E676", "#A5D6A7"], // 绿色系
						["#E040FB", "#F3E5F5"], // 紫色系
						["#FF9800", "#FFE0B2"], // 橙色系
					];
					const colorSet =
						fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
					return colorSet[Math.random() > 0.7 ? 1 : 0];
				}

				// 烟火粒子
				function FireworkParticle(x, y) {
					this.x = x;
					this.y = y;
					this.size = 2 + Math.random() * 5;
					this.color = randomColor();
					this.angle = Math.random() * Math.PI * 2; // 360度均匀分布
					this.speed = 3 + Math.random() * 6;
					this.gravity = 0.05 + Math.random() * 0.07;
					this.drag = 0.96 + Math.random() * 0.02;
					this.rotation = Math.random() * Math.PI * 2;
					this.rotationSpeed = (Math.random() - 0.5) * 0.1;
					this.life = 1;
					this.lifeDecay = 0.008 + Math.random() * 0.004;
					this.glow = 1;
				}

				FireworkParticle.prototype.update = function () {
					this.speed *= this.drag;
					this.x += Math.cos(this.angle) * this.speed;
					this.y += Math.sin(this.angle) * this.speed + this.gravity;
					this.rotation += this.rotationSpeed;
					this.life -= this.lifeDecay;
					this.glow = this.life * 0.8;
				};

				FireworkParticle.prototype.draw = function (ctx) {
					if (this.life <= 0) return;

					ctx.save();
					ctx.globalAlpha = this.life;
					ctx.translate(this.x, this.y);
					ctx.rotate(this.rotation);

					if (this.glow > 0) {
						ctx.shadowColor = this.color;
						ctx.shadowBlur = 6 * this.glow;
					}

					ctx.fillStyle = this.color;
					ctx.beginPath();
					ctx.arc(0, 0, this.size, 0, Math.PI * 2);
					ctx.fill();

					ctx.restore();
				};

				let particles = [];
				// 固定在容器中间偏上区域
				function getExplosionPoint() {
					return {
						x: W * 0.5 + (Math.random() - 0.5) * W * 0.2, // X轴在容器中心±10%范围内
						y: H * 0.35 + (Math.random() - 0.5) * H * 0.1, // Y轴在容器35%高度±5%范围内
					};
				}

				// 封装成可调用的函数
				function celebrationEffect() {
					if (isAnimating) return;
					isAnimating = true;

					particles = [];
					const explosionPoint = getExplosionPoint();
					const particleCount = W < 768 ? 100 : 180;

					for (let i = 0; i < particleCount; i++) {
						particles.push(
							new FireworkParticle(explosionPoint.x, explosionPoint.y)
						);
					}

					const render = () => {
						ctx.clearRect(0, 0, W, H);
						particles.forEach((p) => {
							p.update();
							p.draw(ctx);
						});
						particles = particles.filter((p) => p.life > 0);

						if (particles.length === 0) {
							gsap.ticker.remove(render);
							isAnimating = false;
						}
					};

					gsap.ticker.add(render);
				}

				// 暴露给全局，方便外部调用
				window.celebrationEffect = celebrationEffect;

				// 窗口大小调整时，使用容器的新尺寸更新canvas
				window.addEventListener("resize", () => {
					W = container.offsetWidth;
					H = container.offsetHeight;
					canvas.width = W;
					canvas.height = H;
				});
			});
		</script>
	</body>
</html>
