<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字滚动动画展示</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .title {
        text-align: center;
        font-size: 36px;
        color: #333;
        margin-bottom: 40px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin-bottom: 40px;
      }

      .stat-card {
        background-color: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        transform: translateY(50px);
        opacity: 0;
      }

      .stat-icon {
        width: 60px;
        height: 60px;
        margin: 0 auto 20px;
        background-color: #f0f0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }

      .stat-number {
        font-size: 36px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }

      .stat-label {
        font-size: 16px;
        color: #666;
      }

      .refresh-btn {
        display: block;
        margin: 0 auto;
        padding: 12px 24px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s;
      }

      .refresh-btn:hover {
        transform: translateY(-2px);
      }

      .refresh-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">数据统计展示</h1>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-number sales-count">0</div>
          <div class="stat-label">销售额（元）</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-number user-count">0</div>
          <div class="stat-label">用户数量</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div class="stat-number order-count">0</div>
          <div class="stat-label">订单数量</div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-number rating-count">0</div>
          <div class="stat-label">用户评分</div>
        </div>
      </div>
      <div class="stat-number test">0</div>
      <button class="refresh-btn">刷新数据</button>
    </div>

    <script>
      // 数字从0滚动到目标值
      function countUp(el, target) {
        let obj = { value: 0 };
        gsap.to(obj, {
          value: target,
          duration: 2,
          ease: "power1.out",
          onUpdate: function () {
            el.textContent = Math.ceil(obj.value);
          },
        });
      }
      //   基础版
      countUp(document.querySelector(".test"), 3);

      // 卡片进入动画
      function animateCards() {
        gsap.to(".stat-card", {
          y: 0,
          opacity: 1,
          duration: 0.8,
          stagger: 0.2,
          ease: "power2.out",
        });
      }

      // 初始化动画
      function initAnimations() {
        // 重置所有数值
        document.querySelectorAll(".stat-number").forEach((el) => {
          el.textContent = "0";
        });

        // 数字滚动动画
        countUp(document.querySelector(".sales-count"), 9999);
        countUp(document.querySelector(".user-count"), 25800);
        countUp(document.querySelector(".order-count"), 1856);
        countUp(document.querySelector(".rating-count"), 98);

        // 卡片进入动画
        animateCards();
      }

      // 刷新按钮点击事件
      document.querySelector(".refresh-btn").addEventListener("click", () => {
        // 重置所有动画
        gsap.set(".stat-card", {
          y: 50,
          opacity: 0,
        });

        // 重新运行动画
        initAnimations();
        countUp(document.querySelector(".test"), 3);
      });

      // 页面加载时初始化动画
      window.addEventListener("load", initAnimations);
    </script>
  </body>
</html>
