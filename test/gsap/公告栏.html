<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>响应式无缝切换公告栏</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <style>
      .container {
        width: 100%;
        height: 60px;
        overflow: hidden;
        position: relative;
        background: #f0f0f0;
      }

      .slider {
        display: flex;
        height: 100%;
        will-change: transform; /* 优化性能 */
      }

      .item {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 16px;
      }

      @media (max-width: 768px) {
        .container {
          height: 50px;
        }

        .item {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="slider">
        <div class="item">公告1：这是一条重要的公告信息</div>
        <div class="item">公告2：这是第二条公告内容</div>
        <div class="item">公告3：这是第三条公告信息</div>
      </div>
    </div>

    <script>
      let slider, items, itemWidth, tl;
      let resizeTimer;

      function initSlider() {
        // 获取元素
        slider = document.querySelector(".slider");
        items = document.querySelectorAll(".item");
        itemWidth = items[0].offsetWidth;

        // 清除之前的克隆和时间轴
        const clonedItem = slider.querySelector(".clone");
        if (clonedItem) clonedItem.remove();
        if (tl) tl.kill();

        // 克隆第一个item
        const firstClone = items[0].cloneNode(true);
        firstClone.classList.add("clone");
        slider.appendChild(firstClone);

        // 创建时间轴
        tl = gsap.timeline({
          paused: true,
          repeat: -1,
          onRepeat: () => {
            gsap.set(slider, { x: 0 });
          },
        });

        // 为每个item添加动画
        items.forEach((item, index) => {
          tl.to(slider, {
            x: -(index + 1) * itemWidth,
            duration: 0.8,
            ease: "power2.inOut",
          }).to({}, { duration: 2 }); // 停留2秒
        });

        // 2秒后开始播放
        setTimeout(() => {
          tl.play();
        }, 2000);
      }

      // 初始化
      initSlider();

      // 监听窗口大小变化
      window.addEventListener("resize", () => {
        // 防抖处理
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          // 保存当前状态
          const currentX = gsap.getProperty(slider, "x");

          // 重新初始化
          initSlider();

          // 恢复到之前的位置
          gsap.set(slider, { x: currentX });

          // 继续播放
          if (currentX !== 0) {
            tl.play();
          }
        }, 250);
      });
    </script>
  </body>
</html>
