<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 基础样式重置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f0f0f0;
      }

      /* 按钮样式 */
      .open-modal-btn {
        padding: 12px 24px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s;
      }

      .open-modal-btn:hover {
        transform: translateY(-2px);
      }

      /* 模态框样式 */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
      }

      .modal-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: #000;
        opacity: 0;
      }

      .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 90%;
      }

      .modal-header {
        margin-bottom: 20px;
      }

      .modal-title {
        font-size: 24px;
        font-weight: bold;
      }

      .modal-body {
        margin-bottom: 20px;
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .modal-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .modal-btn-primary {
        background-color: #4caf50;
        color: white;
      }

      .modal-btn-secondary {
        background-color: #f5f5f5;
        color: #333;
      }

      /* 页面内容样式 */
      .content {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      p {
        margin-bottom: 15px;
        line-height: 1.6;
        color: #666;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>
  <body>
    <div class="content">
      <h1>GSAP 模态框示例</h1>
      <p>
        这是一个使用 GSAP 动画库实现的模态框示例。点击下面的按钮来查看动画效果。
      </p>
      <button class="open-modal-btn">打开模态框</button>
    </div>

    <!-- 模态框 HTML 结构 -->
    <div class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">模态框标题</h2>
        </div>
        <div class="modal-body">
          <p>
            这是模态框的内容区域。你可以在这里放置任何内容，比如文本、表单或其他元素。
          </p>
          <p>GSAP 动画使模态框的打开和关闭效果更加流畅自然。</p>
        </div>
        <div class="modal-footer">
          <button class="modal-btn modal-btn-secondary">取消</button>
          <button class="modal-btn modal-btn-primary">确认</button>
        </div>
      </div>
    </div>
  </body>
</html>
<script>
  function openModal(modal) {
    gsap.set(modal, { display: "block", opacity: 0, scale: 0.9 });
    // 遮罩渐入
    gsap.to(modal.querySelector(".modal-overlay"), {
      opacity: 0.7,
      duration: 0.3,
    });
    // 模态框缩放+渐入
    gsap.to(modal, { opacity: 1, scale: 1, duration: 0.3, ease: "power1.out" });
  }

  // 关闭模态框
  function closeModal(modal) {
    gsap.to(modal.querySelector(".modal-overlay"), {
      opacity: 0,
      duration: 0.3,
    });
    gsap.to(modal, {
      opacity: 0,
      scale: 0.9,
      duration: 0.3,
      ease: "power1.in",
      onComplete: () => gsap.set(modal, { display: "none" }),
    });
  }
  // 获取 DOM 元素
  const modal = document.querySelector(".modal");
  const openBtn = document.querySelector(".open-modal-btn");
  const closeBtns = document.querySelectorAll(".modal-btn");
  // 事件监听器
  openBtn.addEventListener("click", () => openModal(modal));

  closeBtns.forEach((btn) => {
    btn.addEventListener("click", () => closeModal(modal));
  });

  // 点击遮罩层关闭模态框
  modal
    .querySelector(".modal-overlay")
    .addEventListener("click", () => closeModal(modal));
</script>
