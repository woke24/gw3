<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>水平无限切换公告栏</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <style>
      .container {
        width: 100%;
        height: 60px;
        overflow: hidden;
        position: relative;
        background: #f0f0f0;
      }

      .slider {
        display: flex;
        height: 100%;
      }

      .item {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="slider">
        <div class="item">公告1：这是第一条公告</div>
        <div class="item">公告2：这是第二条公告</div>
        <div class="item">公告3：这是第三条公告</div>
      </div>
    </div>

    <script>
      const slider = document.querySelector(".slider");
      const items = document.querySelectorAll(".item");
      const itemWidth = items[0].offsetWidth;

      // 复制第一个item到末尾，实现无缝循环
      const firstClone = items[0].cloneNode(true);
      slider.appendChild(firstClone);

      // 创建时间轴，先暂停
      const tl = gsap.timeline({
        paused: true,
        repeat: -1,
        onRepeat: () => {
          gsap.set(slider, { x: 0 });
        },
      });

      // 为每个item添加动画
      items.forEach((item, index) => {
        tl.to(slider, {
          x: -(index + 1) * itemWidth,
          duration: 2,
          ease: "power2.inOut",
          //   ease: "linear",
        }).to({}, { duration: 2 });
      });

      // 2秒后开始播放动画
      setTimeout(() => {
        tl.play();
      }, 2000);
    </script>
  </body>
</html>
