<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<div
			class="status-container success-container"
			id="successContainer"
			style="display: none"
		>
			<svg width="70" height="70" viewBox="0 0 24 24">
				<path class="checkmark" d="M20 6L9 17L4 12" />
			</svg>
		</div>

		<!-- 错误图标 -->
		<div
			class="status-container error-container"
			id="errorContainer"
			style="display: none"
		>
			<svg width="70" height="70" viewBox="0 0 24 24">
				<path class="cross" d="M18 6L6 18" />
				<path class="cross" d="M6 6L18 18" />
			</svg>
		</div>
		<svg viewBox="0 0 24 24" fill="none" width="80" height="80">
			<circle cx="12" cy="12" r="12" fill="#16c60c" />
			<path d="M7 13l3 3 7-7" stroke="#fff" stroke-width="2" fill="none" />
		</svg>
		<svg viewBox="0 0 24 24" fill="none" width="80" height="80">
			<circle cx="12" cy="12" r="12" fill="#e81123" />
			<path d="M8 8l8 8M16 8l-8 8" stroke="#fff" stroke-width="2" fill="none" />
		</svg>

		<svg
			class="btn-loading"
			width="16"
			height="16"
			viewBox="0 0 50 50"
			style="display: none"
		>
			<circle
				cx="25"
				cy="25"
				r="20"
				fill="none"
				stroke="#fff"
				stroke-width="5"
				stroke-linecap="round"
				stroke-dasharray="31.4 31.4"
				transform="rotate(-90 25 25)"
			>
				<animateTransform
					attributeName="transform"
					type="rotate"
					from="0 25 25"
					to="360 25 25"
					dur="1s"
					repeatCount="indefinite"
				/>
			</circle>
		</svg>
	</body>
</html>
