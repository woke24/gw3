<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        background: #f3f4f6;
        padding: 40px;
        font-family: Arial;
      }
      .label {
        position: relative;
        display: block;
        width: 320px;
        margin: 40px auto;
      }
      .label::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 2px;
        background: #333;
        transform: translateY(-50%);
      }
      .label span {
        position: relative;
        display: inline-block;
        padding: 0 10px;
        background: #f3f4f6;
        font-weight: 600;
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="label"><span>Title</span></div>
  </body>
</html>
