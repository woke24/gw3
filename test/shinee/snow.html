<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无轨迹圣诞雪花降落效果</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a192f; /* 圣诞深蓝背景，无渐变更干净 */
        overflow: hidden;
        min-height: 100vh;
      }
      #snowCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div style="height: 1000px; width: 100%">
      <a href="./table.html">5555</a>
    </div>
    <canvas id="snowCanvas"></canvas>

    <script>
      // 雪花配置（极简版）
      const SNOW_CONFIG = {
        totalCount: 180, // 雪花总数
        sizeRange: [1, 6], // 雪花大小范围
        speedRange: [0.4, 1.8], // 下落速度范围
        swingRange: [0.3, 1.2], // 摇摆幅度（轻微即可）
      };

      // 画布初始化
      const canvas = document.getElementById("snowCanvas");
      const ctx = canvas.getContext("2d");
      let snowflakes = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // 雪花类（无轨迹、无旋转、极简运动）
      class Snowflake {
        constructor() {
          // 初始位置
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * -canvas.height;

          // 基础属性（随机）
          this.size =
            Math.random() *
              (SNOW_CONFIG.sizeRange[1] - SNOW_CONFIG.sizeRange[0]) +
            SNOW_CONFIG.sizeRange[0];
          this.speedY =
            Math.random() *
              (SNOW_CONFIG.speedRange[1] - SNOW_CONFIG.speedRange[0]) +
            SNOW_CONFIG.speedRange[0];
          this.swing =
            Math.random() *
              (SNOW_CONFIG.swingRange[1] - SNOW_CONFIG.swingRange[0]) +
            SNOW_CONFIG.swingRange[0];

          // 摇摆角度（仅基础正弦摆动，无多余参数）
          this.angle = Math.random() * Math.PI * 2;
        }

        update() {
          // 垂直下落（无额外速度）
          this.y += this.speedY;
          // 轻微左右摇摆（无轨迹、无微风）
          this.x += Math.sin(this.angle) * this.swing;
          this.angle += 0.01; // 固定摇摆速度，避免杂乱

          // 出界重置
          if (this.y > canvas.height) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * -canvas.height;
          }
        }

        // 绘制干净的六角雪花（无旋转、无透明渐变）
        draw() {
          ctx.beginPath();
          // 极简六角形，无多余瓣状，避免复杂视觉
          for (let i = 0; i < 6; i++) {
            ctx.lineTo(
              this.x + this.size * Math.cos((i * Math.PI) / 3),
              this.y + this.size * Math.sin((i * Math.PI) / 3)
            );
          }
          ctx.closePath();
          ctx.fillStyle = "#ffffff"; // 纯白雪，无透明度
          ctx.fill();
        }
      }

      // 生成雪花
      function createSnowflakes() {
        snowflakes = [];
        for (let i = 0; i < SNOW_CONFIG.totalCount; i++) {
          snowflakes.push(new Snowflake());
        }
      }

      // 动画循环（完全清空画布，无轨迹）
      function animate() {
        // 彻底清空画布，无任何拖影/轨迹
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制所有雪花
        snowflakes.forEach((snowflake) => {
          snowflake.update();
          snowflake.draw();
        });

        requestAnimationFrame(animate);
      }

      // 启动
      window.addEventListener("load", () => {
        createSnowflakes();
        animate();
      });
    </script>
  </body>
</html>
