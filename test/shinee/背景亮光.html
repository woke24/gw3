<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .bwb-tag {
        position: absolute;
        top: 3.6vw;
        left: 19vw;
        background-color: #e0004d;
        color: #fff;
        padding: 0.5vw 1vw;
        font-size: 1vw;
        font-weight: bold;
        overflow: hidden; /* contain the shine */
        border-radius: 0.25vw;
        --shine-duration: 2s; /* 可调整亮光速度 */
      }

      /* 亮光伪元素 */
      .bwb-tag::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -75%;
        width: 25%;
        height: 200%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.9) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-10deg) translateX(0);
        animation: shine var(--shine-duration) linear infinite;
        pointer-events: none;
        mix-blend-mode: screen;
      }

      @keyframes shine {
        from {
          transform: skewX(-10deg) translateX(0);
        }
        to {
          transform: skewX(-10deg) translateX(600%);
        }
      }

      /* Respect user preference for reduced motion */
      /* 用户开启 “减少动效”时,移除或简化动态效果,提升可访问性 */
      @media (prefers-reduced-motion: reduce) {
        .bwb-tag::before {
          animation: none;
          opacity: 0;
        }
      }
    </style>
  </head>

    <div class="bwb-tag">Cyber Week Extended</div>
  </body>
