<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字渐变色</title>
    <style>
      .gradient-text {
        /* 渐变背景：从金色到浅米色 */
        background-image: linear-gradient(
          90deg,
          #ffc107 0%,
          #fef0d5 45%,
          #fef0d5 55%,
          #ffc107 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: bold;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div
      style="
        background-image: linear-gradient(
          90deg,
          #ffc107 0%,
          #fef0d5 45%,
          #fef0d5 55%,
          #ffc107 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        display: inline-block;
        color: transparent;
      "
    >
      BFCM | C2 PLUS ENHANCED
    </div>
  </body>
</html>
